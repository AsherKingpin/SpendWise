<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise — Add Expense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4ff; }
        .card { border-radius: 16px; border: 1px solid #e2e8f0; }
        .card-header { background: #0a1628; border-radius: 16px 16px 0 0 !important; }
        .form-control:focus, .form-select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,.15);
        }
        .btn-primary {
            background: #2563eb; border: none;
            border-radius: 10px; font-weight: 600;
        }
        .btn-primary:hover { background: #1d4ed8; }
    </style>
</head>
<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-6">

                <a href="/" class="text-muted text-decoration-none d-inline-flex align-items-center gap-1 mb-3">
                    ← Back to Dashboard
                </a>

                <div class="card shadow-sm">
                    <div class="card-header py-3 px-4">
                        <h5 class="text-white mb-0 fw-semibold">💸 Add Expense</h5>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                                Add Expense
                            </button>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
